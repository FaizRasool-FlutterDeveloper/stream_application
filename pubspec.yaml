name: stream_application
description: A GetX + SharedPreferences example app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  http: ^1.2.2
  flutter_dotenv: ^6.0.0
  carousel_slider: ^5.1.1
  shimmer: ^3.0.0
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.2
  youtube_player_flutter: ^9.1.3
  get_storage: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/.env
